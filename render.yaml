services:
  - type: web
    name: appointment-app
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_PHONE
        sync: false          # You will enter this manually in the Render dashboard
      - key: RENDER
        value: "true"        # Tells the app to use /data for the SQLite DB
    disk:
      name: appointment-data
      mountPath: /data
      sizeGB: 1              # Persistent disk — keeps your DB across deploys ($0.25/GB/mo)
